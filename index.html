<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whozit - Select Gamemode</title>
    <link rel="stylesheet" href="css/originals.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/navbar.css">
</head>
<body>
<!-- <a class="language">&#x1f1f8;&#x1f1ea;</a> -->
    <div class="navbar">
        <a href="index.html" class="navbar-home navbar-a">Home</a>
        <a href="about.html" class="navbar-a">About</a>
        <div class="nav-item">
            <button class="navbar-language-link navbar-a" onclick="toggleLanguages()">&#x1f1f8;&#x1f1ea;
                <span style="display: inline-block; transform: rotate(90deg); font-size: 1rem;">&#10148;</span>
            </button>
            <div class="language-dropdown" id="language-dropdown">
                <button href="" class="language">&#x1F1EC;&#x1F1E7; English</button>
            </div>
        </div>
        <input placeholder="Timer (sec)" class="timer" id="timerInput" type="number" value="60" min="10" max="600">
        <a href="preview.html" class="navbar-a">Hur spelar man?</a>
    </div>

    <div class="container">
        <div class="center">
            <button onclick="startStarwars()" class="gamemode-link">
                <div class="mode-title-container star-wars-container">
                    <img src="img/icons/Mogakin.png" alt="Anakin Skywalker. Spelläge Starwars" class="mode-title-img">
                    <p class="mode-title">STAR WARS</p>
                </div>
            </button>
            <button onclick="startHarrypotter()" class="gamemode-link">
                <div class="mode-title-container harry-potter-container">
                    <img src="img/icons/harry-choppedter.png" alt="Harry Potter. Spelläge Harry Potter" class="mode-title-img">
                    <p class="mode-title">HARRY POTTER</p>
                </div>
            </button>
            <button onclick="startMarvel()" class="gamemode-link">
                <div class="mode-title-container harry-potter-container">
                    <img src="img/icons/tony_zestark.png" alt="Iron Man. Spelläge Marvel" class="mode-title-img">
                    <!-- <p class="mode-title" style="margin-bottom: 110px;">MARVEL</p> -->
                    <p class="mode-title">MARVEL (EJ KLAR)</p>
                </div>
            </button>
        </div>
    </div>
    <script src="js/top.js"></script>
    <script src="js/site.js"></script>
</body>
</html>
